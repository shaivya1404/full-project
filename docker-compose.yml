version: "3.8"

# All services read from the single root .env file.
# For local dev without Docker, run: infra/start_dev.sh

services:

  # ─── Database (skip if using Neon / external Postgres) ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oolix_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles: ["self-hosted-db"]  # only starts with: docker compose --profile self-hosted-db up

  # ─── Backend API (Node.js) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oolix_backend
    env_file: ./.env
    environment:
      NODE_ENV: production
      RECORDING_STORAGE_PATH: /app/recordings
      CUSTOM_PIPELINE_URL: ws://pipeline:8765   # override for Docker networking
    volumes:
      - recordings_data:/app/recordings
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      pipeline:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-4000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── Custom Voice Pipeline (Python) ──────────────────────────────────────
  pipeline:
    build:
      context: ./backend/pipeline
      dockerfile: Dockerfile
    container_name: oolix_pipeline
    env_file: ./.env
    volumes:
      - whisper_cache:/root/.cache/whisper
      - torch_hub_cache:/root/.cache/torch/hub
    ports:
      - "${PIPELINE_PORT:-8765}:${PIPELINE_PORT:-8765}"
    # GPU support — remove 'deploy' block if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import websockets, asyncio; asyncio.run(websockets.connect('ws://localhost:${PIPELINE_PORT:-8765}'))"]
      interval: 30s
      timeout: 10s
      start_period: 60s   # allow time for model loading
      retries: 3
    restart: unless-stopped

  # ─── Frontend (React + Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: oolix_frontend
    env_file: ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  recordings_data:
  whisper_cache:
  torch_hub_cache:

networks:
  default:
    name: oolix_network
